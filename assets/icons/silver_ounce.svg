<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="256" cy="480" rx="100" ry="18" fill="url(#silverShadow)" opacity="0.25"/>
  
  <!-- Silver Bar Base -->
  <path d="M190 210 L322 210 L342 370 L170 370 Z" fill="url(#silverGradient1)"/>
  
  <!-- Silver Bar Top -->
  <path d="M170 210 L190 210 L322 210 L342 210 L326 192 L186 192 Z" fill="url(#silverGradient2)"/>
  
  <!-- Silver Bar Side -->
  <path d="M322 210 L342 210 L342 370 L322 370 Z" fill="url(#silverGradient3)"/>
  
  <!-- Shine Effects (اللمعان البارد للفضة) -->
  <path d="M210 230 Q256 245 300 230" stroke="url(#silverShine)" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M210 270 Q256 285 300 270" stroke="url(#silverShine)" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="250" cy="250" rx="15" ry="8" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Text: Ag 999 -->
  <text x="256" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#4A4A4A">Ag</text>
  <text x="256" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#6A6A6A">999</text>
  <text x="256" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#6A6A6A">SILVER</text>
  
  <!-- Gradients -->
  <defs>
    <!-- Silver Gradient 1 (Front) -->
    <linearGradient id="silverGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#A9A9A9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    
    <!-- Silver Gradient 2 (Top - Brighter) -->
    <linearGradient id="silverGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Silver Gradient 3 (Side - Darker) -->
    <linearGradient id="silverGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    
    <!-- Silver Shine (Cold Blue tint) -->
    <linearGradient id="silverShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B0C4DE;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#B0C4DE;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Shadow -->
    <radialGradient id="silverShadow">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
