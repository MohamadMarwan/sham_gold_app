<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Hexagon (Crystal Shape) -->
  <path d="M128 20 L200 70 L200 186 L128 236 L56 186 L56 70 Z" fill="url(#crystalGradient1)"/>
  
  <!-- Inner Hexagon -->
  <path d="M128 50 L180 85 L180 171 L128 206 L76 171 L76 85 Z" fill="url(#crystalGradient2)"/>
  
  <!-- Facets (للتأثير البلوري) -->
  <path d="M128 50 L128 128 L180 85 Z" fill="url(#facetGradient1)" opacity="0.3"/>
  <path d="M128 50 L128 128 L76 85 Z" fill="url(#facetGradient2)" opacity="0.2"/>
  <path d="M128 206 L128 128 L180 171 Z" fill="url(#facetGradient3)" opacity="0.4"/>
  <path d="M128 206 L128 128 L76 171 Z" fill="url(#facetGradient4)" opacity="0.3"/>
  
  <!-- 18K Text -->
  <text x="128" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="#FFF8DC">18K</text>
  
  <!-- Sparkles -->
  <circle cx="90" cy="100" r="4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="166" cy="110" r="3" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="110" cy="160" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="150" cy="150" r="2" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="crystalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="crystalGradient2">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="facetGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.2" />
    </linearGradient>
    
    <linearGradient id="facetGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:0.2" />
    </linearGradient>
    
    <linearGradient id="facetGradient3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF7F50;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.2" />
    </linearGradient>
    
    <linearGradient id="facetGradient4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.2" />
    </linearGradient>
  </defs>
</svg>
