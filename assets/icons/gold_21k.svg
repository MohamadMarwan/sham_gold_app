  <!-- Shine Effects -->
  <circle cx="105" cy="115" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="150" cy="120" r="2" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Gradients -->
