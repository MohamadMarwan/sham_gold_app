workflows:
  # ══════════════════════════════════════
  # iOS App Store Build
  # ══════════════════════════════════════
  ios-release:
    name: "🍎 iOS App Store Release"
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: "magic key"
    environment:
      flutter: 3.41.7
      xcode: latest
      ios_signing:
        distribution_type: app_store
        provisioning_profiles:
          - goldsham
        certificates:
          - gold_cert
      vars:
        BUNDLE_ID: "com.toiall.goldsham"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch Xcode Project
        script: python3 patch_xcode.py

      - name: Install Pods
        script: cd ios && pod install --repo-update

      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # غيّره لـ true عند الجاهزية

  # ══════════════════════════════════════
  # Android Google Play Build
  # ══════════════════════════════════════
  android-release:
    name: "🤖 Android Play Store Release"
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.41.7
      android_signing:
        - gold_sham_keystore  # اسم الـ keystore في إعدادات Codemagic
      vars:
        PACKAGE_NAME: "com.toiall.gold_sham"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

      - name: Build App Bundle
        script: flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # internal → alpha → beta → production
        submit_as_draft: true
