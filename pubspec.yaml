name: gold_sham
description: Gold Sham Mobile Application for Price Display
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  provider: ^6.0.5
  cupertino_icons: ^1.0.6
  socket_io_client: ^2.0.3
  http: ^1.1.0
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.1
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  flutter_svg: ^2.0.9
  showcaseview: ^3.0.0
  google_fonts: ^6.1.0
  screenshot: ^3.0.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/logo.png
